<!DOCTYPE html>
<html>
<head>
<title>Crédito y Cobranza PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
h1 {color:#38bdf8;}

.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}

input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}

button {
    padding:8px;
    margin:3px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.save {background:#22c55e;}
.delete {background:#ef4444;}
.export {background:#22c55e;}

.green {color:#22c55e;}
.yellow {color:#facc15;}
.orange {color:#fb923c;}
.red {color:#ef4444;}

table {width:100%; border-collapse:collapse; text-align:center;}
th, td {padding:10px; border-bottom:1px solid #334155;}
</style>
</head>

<body>

<h1>💳 Crédito y Cobranza PRO</h1>

<!-- CLIENTES -->
<div class="card">
<h2>👤 Clientes</h2>
<input id="clienteNombre" placeholder="Nombre cliente">
<select id="tipo">
<option value="45">A (45 días)</option>
<option value="30">B (30 días)</option>
<option value="15">C (15 días)</option>
</select>
<button class="save" onclick="guardarCliente()">Guardar</button>
</div>

<!-- CUENTAS -->
<div class="card">
<h2>💰 Nueva Cuenta</h2>
<select id="clienteSelect"></select>
<input id="monto" placeholder="Monto $">
<input type="date" id="fecha">
<button class="save" onclick="guardarCuenta()">Registrar</button>
</div>

<!-- PROMESA -->
<div class="card">
<h2>📅 Promesa de Pago</h2>
<select id="cuentaSelect"></select>
<input type="date" id="fechaPromesa">
<button class="save" onclick="guardarPromesa()">Guardar Promesa</button>
</div>

<!-- DASHBOARD -->
<div class="card">
<h2>📊 Dashboard Ejecutivo</h2>
<div id="dashboard"></div>
</div>

<!-- TABLA -->
<div class="card">
<button class="export" onclick="exportarExcel()">📊 Exportar</button>
<table id="tabla"></table>
</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let cuentas = JSON.parse(localStorage.getItem("cuentas")) || [];
let promesas = JSON.parse(localStorage.getItem("promesas")) || [];

// ===== HELPERS =====

function dias(fecha){
    return Math.floor((new Date() - new Date(fecha)) / (1000*60*60*24));
}

function aging(d){
    if(d<=30) return "green";
    if(d<=60) return "yellow";
    if(d<=90) return "orange";
    return "red";
}

// ===== PROMESAS =====

function obtenerPromesa(cuentaId){
    return promesas.find(p => p.cuenta == cuentaId);
}

function estadoPromesa(p){

    if(!p) return "—";

    let hoy = new Date();
    let fecha = new Date(p.fecha);

    if(p.cumplido) return "✅ Cumplida";
    if(hoy > fecha) return "🔴 Vencida";

    return "🟡 Pendiente";
}

function guardarPromesa(){

    let existente = promesas.find(p => p.cuenta == cuentaSelect.value);

    if(existente){
        existente.fecha = fechaPromesa.value;
        existente.cumplido = false;
    } else {
        promesas.push({
            cuenta: cuentaSelect.value,
            fecha: fechaPromesa.value,
            cumplido: false
        });
    }

    localStorage.setItem("promesas", JSON.stringify(promesas));
    render();
}

function cumplirPromesa(cuentaId){

    let promesa = promesas.find(p => p.cuenta == cuentaId);

    if(promesa){
        promesa.cumplido = true;
        localStorage.setItem("promesas", JSON.stringify(promesas));
        render();
    }
}

// ===== CLIENTES =====

function guardarCliente(){

    clientes.push({
        id: Date.now(),
        nombre: clienteNombre.value,
        plazo: parseInt(tipo.value)
    });

    localStorage.setItem("clientes", JSON.stringify(clientes));
    cargar();
}

// ===== CUENTAS =====

function guardarCuenta(){

    cuentas.push({
        id: Date.now(),
        cliente: clienteSelect.value,
        monto: +monto.value || 0,
        fecha: fecha.value
    });

    localStorage.setItem("cuentas", JSON.stringify(cuentas));
    render();
}

// ===== DASHBOARD =====

function dashboardCalc(){

    let total = cuentas.reduce((a,b)=>a+b.monto,0);

    let vencido = cuentas.filter(c=>dias(c.fecha)>60)
                         .reduce((a,b)=>a+b.monto,0);

    let dso = cuentas.length ?
        cuentas.reduce((a,b)=>a+dias(b.fecha),0)/cuentas.length : 0;

    dashboard.innerHTML = `
    <div>💰 Cartera total: $${total.toFixed(0)}</div>
    <div>⚠️ % vencida: ${total ? ((vencido/total)*100).toFixed(1):0}%</div>
    <div>⏱ DSO: ${dso.toFixed(1)} días</div>
    `;
}

// ===== SCORE =====

function scoreCliente(clienteId){

    let cuentasCliente = cuentas.filter(c=>c.cliente==clienteId);

    let total = cuentasCliente.reduce((a,b)=>a+b.monto,0);

    let vencido = cuentasCliente.filter(c=>dias(c.fecha)>60)
                                 .reduce((a,b)=>a+b.monto,0);

    let diasPromedio = cuentasCliente.length ?
        cuentasCliente.reduce((a,b)=>a+dias(b.fecha),0)/cuentasCliente.length : 0;

    let ratio = total ? vencido/total : 0;

    let score = 100;

    score -= ratio * 60;
    score -= (diasPromedio/90)*40;

    return Math.max(0, score).toFixed(0);
}

// ===== BLOQUEO =====

function bloqueado(cliente){
    return cuentas.some(c=>c.cliente==cliente.id && dias(c.fecha)>60);
}

// ===== RENDER =====

function render(){

    tabla.innerHTML = `
    <tr>
    <th>Cliente</th>
    <th>Monto</th>
    <th>Días</th>
    <th>Score</th>
    <th>Status</th>
    <th>Promesa</th>
    <th></th>
    </tr>
    `;

    cuentas.forEach(c=>{

        let cliente = clientes.find(x=>x.id==c.cliente);
        let d = dias(c.fecha);
        let promesa = obtenerPromesa(c.id);

        tabla.innerHTML += `
        <tr>
        <td>${cliente?.nombre}</td>
        <td>$${c.monto}</td>
        <td class="${aging(d)}">${d}</td>
        <td>${scoreCliente(c.cliente)}</td>
        <td>${bloqueado(cliente) ? "🚫 BLOQUEADO" : "OK"}</td>
        <td>
            ${promesa ? promesa.fecha : "—"}<br>
            ${estadoPromesa(promesa)}<br>
            ${promesa && !promesa.cumplido ? `<button onclick="cumplirPromesa(${c.id})">✔</button>` : ""}
        </td>
        <td><button class="delete" onclick="eliminar(${c.id})">🗑</button></td>
        </tr>
        `;
    });

    dashboardCalc();
}

// ===== DELETE =====

function eliminar(id){
    cuentas = cuentas.filter(c=>c.id!=id);
    localStorage.setItem("cuentas", JSON.stringify(cuentas));
    render();
}

// ===== EXPORT =====

function exportarExcel(){

    let data = cuentas.map(c=>{
        let cliente = clientes.find(x=>x.id==c.cliente);
        let promesa = obtenerPromesa(c.id);

        return {
            Cliente: cliente?.nombre,
            Monto: c.monto,
            Dias: dias(c.fecha),
            Score: scoreCliente(c.cliente),
            "Fecha Promesa": promesa ? promesa.fecha : "",
            "Estado Promesa": estadoPromesa(promesa)
        };
    });

    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Cartera");

    XLSX.writeFile(wb, "Cartera_PRO.xlsx");
}

// ===== LOAD =====

function cargar(){

    clienteSelect.innerHTML="";
    cuentaSelect.innerHTML="";

    clientes.forEach(c=>{
        clienteSelect.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
    });

    cuentas.forEach(c=>{
        let cliente = clientes.find(x=>x.id==c.cliente);

        cuentaSelect.innerHTML += `
        <option value="${c.id}">
        ${cliente?.nombre} - $${c.monto}
        </option>`;
    });

    render();
}

cargar();

</script>

</body>
</html>
