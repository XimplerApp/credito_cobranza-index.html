<!DOCTYPE html>
<html>
<head>
<title>Crédito y Cobranza PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; padding:20px;}
.card {background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px;}
input, select {width:100%; padding:10px; margin:6px 0; border-radius:6px;}
button {padding:6px 10px; border:none; border-radius:6px; cursor:pointer;}
.save {background:#22c55e;}
table {width:100%; text-align:center;}
th, td {padding:10px; border-bottom:1px solid #334155;}
</style>
</head>

<body>

<h1>💳 Crédito y Cobranza PRO</h1>

<div class="card">
<h2>Clientes</h2>
<input id="clienteNombre" placeholder="Nombre">
<button class="save" onclick="guardarCliente()">Guardar</button>
</div>

<div class="card">
<h2>Scoring</h2>
<select id="clienteScore"></select>
<input id="antiguedad" placeholder="Antigüedad">
<input id="referencias" placeholder="Referencias">
<input id="historial" placeholder="Historial">
<input id="ticket" placeholder="Ticket">
<input id="riesgo" placeholder="Riesgo">
<input id="garantias" placeholder="Garantías">
<button class="save" onclick="guardarScore()">Calcular</button>
</div>

<div class="card">
<h2>Nueva Cuenta</h2>
<select id="clienteSelect"></select>
<input id="monto" placeholder="Monto">
<select id="credito">
<option value="">Selecciona crédito</option>
<option value="15">15 días</option>
<option value="30">30 días</option>
<option value="45">45 días</option>
</select>
<input type="date" id="fecha">
<button class="save" onclick="guardarCuenta()">Registrar</button>
</div>

<div class="card">
<h2>Promesa de Pago</h2>
<select id="cuentaSelect"></select>
<input type="date" id="fechaPromesa">
<button class="save" onclick="guardarPromesa()">Guardar Promesa</button>
</div>

<div class="card">
<h2>💰 Cost to Collect</h2>

<input id="horas" placeholder="Costo horas personal">
<input id="viaticos" placeholder="Viáticos">
<input id="comunicacion" placeholder="Llamadas / comunicación">
<input id="admin" placeholder="Gastos administrativos">

<button class="save" onclick="guardarCostos()">Guardar Costos</button>

<div id="costDashboard"></div>

</div>

<div class="card">
<h2>📊 Tablero Ejecutivo de Cartera</h2>
<div id="kpis"></div>
</div>

<div class="card">

<button class="save" onclick="exportarCSV()">📊 Exportar CSV</button>

<table id="tabla"></table>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let cuentas = JSON.parse(localStorage.getItem("cuentas")) || [];
let scores = JSON.parse(localStorage.getItem("scores")) || [];
let promesas = JSON.parse(localStorage.getItem("promesas")) || [];
let pagos = JSON.parse(localStorage.getItem("pagos")) || [];
let costos = JSON.parse(localStorage.getItem("costos")) || {};

// ===== HELPERS =====
function dias(fecha){
    return Math.floor((new Date() - new Date(fecha))/(1000*60*60*24));
}

// ===== CLIENTES =====
function guardarCliente(){
    clientes.push({id:Date.now(), nombre:clienteNombre.value});
    localStorage.setItem("clientes", JSON.stringify(clientes));
    cargar();
}

// ===== SCORING =====
function guardarScore(){
    let total = +antiguedad.value + +referencias.value + +historial.value +
                +ticket.value + +riesgo.value + +garantias.value;

    let banda = total>=80?"A":total>=60?"B":"C";

    let existente = scores.find(s=>s.cliente==clienteScore.value);

    if(existente){
        existente.total=total;
        existente.banda=banda;
    }else{
        scores.push({cliente:clienteScore.value,total,banda});
    }

    localStorage.setItem("scores", JSON.stringify(scores));
    render();
}

function obtenerScore(id){
    return scores.find(s=>s.cliente==id);
}

// ===== CRÉDITO =====
function nivelCredito(id){

    let score = obtenerScore(id);
    let pagosCliente = pagos.filter(p=>p.cliente==id).length;
    let vencido = cuentas.some(c=>c.cliente==id && dias(c.fecha)>60);

    if(vencido) return 0;
    if(score && score.banda==="C") return 0;
    if(score && score.total>=80) return 45;
    if(pagosCliente>=2) return 30;

    return 15;
}

// ===== CUENTAS =====
function guardarCuenta(){

    let creditoElegido = parseInt(credito.value);

    if(!creditoElegido){
        alert("Selecciona crédito");
        return;
    }

    cuentas.push({
        id: Date.now(),
        cliente: clienteSelect.value,
        monto: +monto.value,
        fecha: fecha.value,
        credito: creditoElegido
    });

    localStorage.setItem("cuentas", JSON.stringify(cuentas));
    render();
}

// ===== PROMESAS =====
function guardarPromesa(){
    promesas.push({
        cuenta: cuentaSelect.value,
        fecha: fechaPromesa.value,
        cumplido:false
    });

    localStorage.setItem("promesas", JSON.stringify(promesas));
    render();
}

function obtenerPromesa(id){
    return promesas.find(p=>p.cuenta==id);
}

// 🔥 BOTÓN CUMPLIR
function cumplirPromesa(id){

    let p = promesas.find(x=>x.cuenta==id);

    if(p){
        p.cumplido=true;

        pagos.push({
            cliente: cuentas.find(c=>c.id==id).cliente,
            fecha: new Date().toISOString()
        });

        localStorage.setItem("pagos", JSON.stringify(pagos));
        localStorage.setItem("promesas", JSON.stringify(promesas));

        render();
    }
}

// 🔥 ESTADO DINÁMICO
function estadoPromesa(p, id){

    if(!p) return "—";

    if(p.cumplido) return "✅ Cumplida";

    if(new Date()>new Date(p.fecha)){
        return `🔴 Vencida <br><button onclick="cumplirPromesa(${id})">✔</button>`;
    }

    return `🟡 Pendiente <br><button onclick="cumplirPromesa(${id})">✔</button>`;
}

function calcularKPIs(){

    let total = cuentas.reduce((a,b)=>a+b.monto,0);

    let dso = cuentas.length ?
        cuentas.reduce((a,b)=>a+Math.max(0,dias(b.fecha)),0)/cuentas.length : 0;

    let cartera60 = cuentas.filter(c=>dias(c.fecha)>60)
                           .reduce((a,b)=>a+b.monto,0);

    let pct60 = total ? (cartera60/total)*100 : 0;

    let cobro30 = cuentas.filter(c=>dias(c.fecha)<=30).length;
    let pctCobro30 = cuentas.length ? (cobro30/cuentas.length)*100 : 0;

    let promesasTot = promesas.length;
    let cumplidas = promesas.filter(p=>p.cumplido).length;
    let pctPTP = promesasTot ? (cumplidas/promesasTot)*100 : 0;

    return {
        dso,
        pct60,
        pctCobro30,
        pctPTP
    };
}

function semaforo(valor, meta, tipo){

    if(tipo==="max"){
        if(valor <= meta) return "🟢";
        if(valor <= meta*1.2) return "🟡";
        return "🔴";
    }

    if(tipo==="min"){
        if(valor >= meta) return "🟢";
        if(valor >= meta*0.8) return "🟡";
        return "🔴";
    }
}

// ===== COST TO COLLECT =====

let costos = JSON.parse(localStorage.getItem("costos")) || {};

function guardarCostos(){

    costos = {
        horas: +horas.value || 0,
        viaticos: +viaticos.value || 0,
        comunicacion: +comunicacion.value || 0,
        admin: +admin.value || 0
    };

    localStorage.setItem("costos", JSON.stringify(costos));
    render();
}

function calcularCostToCollect(){

    let totalCost =
        (costos.horas || 0) +
        (costos.viaticos || 0) +
        (costos.comunicacion || 0) +
        (costos.admin || 0);

    let recuperado = pagos.length 
        ? cuentas.reduce((a,b)=>a+b.monto,0)
        : 0;

    let ratio = recuperado ? (totalCost / recuperado) * 100 : 0;

    return {
        totalCost,
        ratio
    };
}

// ===== RENDER =====
function render(){

    tabla.innerHTML=`
    <tr>
    <th>Cliente</th>
    <th>Score</th>
    <th>Crédito Sistema</th>
    <th>Crédito Otorgado</th>
    <th>Monto</th>
    <th>Días</th>
    <th>Promesa</th>
    </tr>`;

    cuentas.forEach(c=>{

        let cliente = clientes.find(x=>x.id==c.cliente);
        let score = obtenerScore(c.cliente);
        let promesa = obtenerPromesa(c.id);

        tabla.innerHTML+=`
        <tr>
        <td>${cliente?.nombre}</td>
        <td>${score?score.total:"—"}</td>
        <td>${nivelCredito(c.cliente)} días</td>
        <td>${c.credito} días</td>
        <td>$${c.monto.toLocaleString()}</td>
        <td>${dias(c.fecha)}</td>
        <td>${estadoPromesa(promesa, c.id)}</td>
        </tr>`;
    });
}

let k = calcularKPIs();

kpis.innerHTML = `
<table>
<tr><th>KPI</th><th>Resultado</th><th>Estado</th></tr>

<tr>
<td>DSO</td>
<td>${k.dso.toFixed(1)} días</td>
<td>${semaforo(k.dso,45,"max")}</td>
</tr>

<tr>
<td>% cartera 60+</td>
<td>${k.pct60.toFixed(1)}%</td>
<td>${semaforo(k.pct60,10,"max")}</td>
</tr>

<tr>
<td>Cobro a 30 días</td>
<td>${k.pctCobro30.toFixed(1)}%</td>
<td>${semaforo(k.pctCobro30,70,"min")}</td>
</tr>

<tr>
<td>PTP cumplidas</td>
<td>${k.pctPTP.toFixed(1)}%</td>
<td>${semaforo(k.pctPTP,85,"min")}</td>
</tr>

</table>
`;

let cost = calcularCostToCollect();

costDashboard.innerHTML = `
<div>💰 Costo cobranza: $${cost.totalCost.toLocaleString()}</div>
<div>📊 Cost to Collect: ${cost.ratio.toFixed(1)}%</div>
`;

// ===== LOAD =====
function cargar(){

    clienteSelect.innerHTML="";
    clienteScore.innerHTML="";
    cuentaSelect.innerHTML="";

    clientes.forEach(c=>{
        clienteSelect.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
        clienteScore.innerHTML+=`<option value="${c.id}">${c.nombre}</option>`;
    });

    cuentas.forEach(c=>{
        let cliente = clientes.find(x=>x.id==c.cliente);
        cuentaSelect.innerHTML+=`<option value="${c.id}">${cliente?.nombre}</option>`;
    });

    render();
}

function exportarCSV(){

    if(cuentas.length === 0){
        alert("No hay datos");
        return;
    }

    let headers = [
        "Cliente",
        "Score",
        "Banda",
        "CreditoSistema",
        "CreditoOtorgado",
        "Monto",
        "Dias",
        "FechaPromesa",
        "EstadoPromesa"
    ];

    let csv = headers.join(",") + "\n";

    cuentas.forEach(c=>{

        let cliente = clientes.find(x=>x.id==c.cliente);
        let score = obtenerScore(c.cliente);
        let promesa = obtenerPromesa(c.id);

        let row = [
            cliente?.nombre || "",
            score?.total || "",
            score?.banda || "",
            nivelCredito(c.cliente),
            c.credito || "",
            c.monto || 0,
            dias(c.fecha),
            promesa?.fecha || "",
            promesa ? (promesa.cumplido ? "Cumplida" : "Pendiente") : ""
        ];

        csv += row.map(v => `"${v}"`).join(",") + "\n";
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "Cartera_PRO.csv";
    a.click();
}

cargar();

</script>

</body>
</html>
